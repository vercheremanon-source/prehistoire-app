<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="data.js"></script>

<script>
let filter = "all";

// === CHARGEMENT LOCAL STORAGE ===
let savedData = localStorage.getItem("prehistoire");

if (savedData) {
  const parsed = JSON.parse(savedData);
  DATA.events = parsed.events || DATA.events;
  DATA.sites = parsed.sites || DATA.sites;
}

// === SAUVEGARDE ===
function saveData() {
  localStorage.setItem("prehistoire", JSON.stringify(DATA));
}

// === FRIISE ===
const timeline = document.getElementById("timeline");
const minYear = -300000;
const maxYear = 0;

function renderTimeline() {
  timeline.innerHTML = "";

  DATA.events.forEach(e => {

    if (filter !== "all" && e.category !== filter) return;

    const percent = (e.year - minYear) / (maxYear - minYear);

    const div = document.createElement("div");
    div.className = "event " + e.category;
    div.style.left = (percent * 100) + "%";
    div.innerText = e.title;

    div.onclick = () => show(e);

    timeline.appendChild(div);
  });
}

function setFilter(f) {
  filter = f;
  renderTimeline();
}

// === CARTE ===
const map = L.map('map').setView([46.5, 2], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

function renderMap() {
  DATA.sites.forEach(site => {
    const marker = L.marker(site.coords).addTo(map);

    marker.bindTooltip(site.name, {
      permanent: true,
      direction: 'right',
      className: 'label'
    });

    marker.on('click', () => show(site));
  });
}

// === DETAILS ===
function show(item) {
  let links = "";

  if (item.links) {
    links = "<br><br><strong>Liens :</strong><br>" +
      item.links.map(l => "→ " + l).join("<br>");
  }

  document.getElementById("details").innerHTML =
    "<strong>" + item.title + "</strong><br>" +
    item.description + links;
}

// === AJOUT ===
function addEvent() {
  const newEvent = {
    title: document.getElementById("title").value,
    year: parseInt(document.getElementById("year").value),
    category: document.getElementById("category").value,
    description: document.getElementById("desc").value
  };

  DATA.events.push(newEvent);

  saveData(); // 🔥 sauvegarde automatique

  renderTimeline();
}

// === INIT ===
renderTimeline();
renderMap();
</script>
