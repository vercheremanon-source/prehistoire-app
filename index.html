<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Préhistoire Interactive</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css"/>

  <style>
    body { font-family: Arial; margin: 0; padding: 20px; }

    .timeline-container {
      overflow-x: auto;
      border-bottom: 3px solid black;
      margin-bottom: 30px;
    }

    .timeline {
      position: relative;
      height: 120px;
      width: 2000px;
    }

    .event {
      position: absolute;
      top: 40px;
      transform: translateX(-50%);
      background: #eee;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 14px;
    }

    #map {
      height: 400px;
    }

    .details {
      margin-top: 20px;
      padding: 15px;
      border: 1px solid #ccc;
      border-radius: 10px;
    }

    .label {
      background: white;
      padding: 2px 6px;
      border-radius: 6px;
      font-size: 12px;
      border: 1px solid #ccc;
    }
  </style>
</head>
<body>

<h1>Frise Chronologique</h1>

<div class="timeline-container">
  <div class="timeline" id="timeline"></div>
</div>

<h1>Carte des sites</h1>
<div id="map"></div>

<div id="details" class="details">Clique sur un élément</div>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
<script src="data.js"></script>

<script>
// === FRIISE ===
const timeline = document.getElementById("timeline");

const minYear = -300000;
const maxYear = 0;

DATA.events.forEach(e => {
  const percent = (e.year - minYear) / (maxYear - minYear);

  const div = document.createElement("div");
  div.className = "event";
  div.style.left = (percent * 100) + "%";
  div.innerText = e.title;

  div.onclick = () => show(e.title, e.description);

  timeline.appendChild(div);
});

// === CARTE ===
const map = L.map('map').setView([46.5, 2], 5);

L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

DATA.sites.forEach(site => {
  const marker = L.marker(site.coords).addTo(map);

  // NOM TOUJOURS VISIBLE
  marker.bindTooltip(site.name, { permanent: true, direction: 'right', className: 'label' });

  marker.on('click', () => show(site.name, site.description));
});

// === DETAILS ===
function show(title, text) {
  document.getElementById("details").innerHTML = `<strong>${title}</strong><br>${text}`;
}
</script>

</body>
</html>
