<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Préhistoire Interactive</title>
  <style>
    body { font-family: Arial; margin: 0; padding: 20px; }
    .timeline { display: flex; overflow-x: auto; gap: 20px; padding: 20px 0; }
    .event { padding: 10px 20px; background: #eee; border-radius: 10px; cursor: pointer; }
    .map { margin-top: 40px; }
    .point { cursor: pointer; color: blue; }
    .details { margin-top: 20px; padding: 20px; border: 1px solid #ccc; border-radius: 10px; }
  </style>
</head>
<body>

<h1>Frise Chronologique</h1>
<div class="timeline">
  <div class="event" onclick="show('neandertal')">-40 000</div>
  <div class="event" onclick="show('sapiens')">-300 000</div>
</div>

<h1>Carte des sites</h1>
<div class="map">
  <div class="point" onclick="show('lascaux')">📍 Lascaux (France)</div><br>
  <div class="point" onclick="show('chauvet')">📍 Chauvet (France)</div>
</div>

<div id="details" class="details"></div>

<script>
function show(id) {
  const data = {
    neandertal: "Extinction des Néandertaliens : hypothèses = climat, compétition, hybridation.",
    sapiens: "Homo sapiens : origine africaine, développement culturel.",
    lascaux: "Lascaux (~17 000 ans) : peintures rupestres très détaillées.",
    chauvet: "Chauvet (~36 000 ans) : art parmi les plus anciens connus."
  };
  document.getElementById("details").innerText = data[id];
}
</script>

</body>
</html>
